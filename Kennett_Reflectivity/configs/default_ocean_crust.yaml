# Default 5-layer ocean-crust model for tau-p inversion.
#
# Matches the Fortran kennetslo.f reference model.
# Layer 0 (Ocean) is always fixed during inversion.

model:
  layers:
    - name: Ocean
      alpha: 1.5
      beta: 0.0
      rho: 1.0
      thickness: 2.0
      Q_alpha: 20000
      Q_beta: 1.0e+10
    - name: Sediment
      alpha: 1.6
      beta: 0.3
      rho: 2.0
      thickness: 1.0
      Q_alpha: 100
      Q_beta: 100
    - name: Crust
      alpha: 3.0
      beta: 1.5
      rho: 3.0
      thickness: 1.0
      Q_alpha: 100
      Q_beta: 100
    - name: Upper mantle
      alpha: 5.0
      beta: 3.0
      rho: 3.0
      thickness: 1.0
      Q_alpha: 100
      Q_beta: 100
    - name: Half-space
      alpha: 2.2
      beta: 1.1
      rho: 1.8
      thickness: .inf
      Q_alpha: 100
      Q_beta: 100
  fixed_layers: [0]

inversion:
  p_values: [0.05, 0.10, 0.15, 0.20, 0.25, 0.30,
             0.35, 0.40, 0.45, 0.50, 0.55, 0.60]
  nfreq: 64
  perturbation: 0.15
  max_iter: 50
  seed: 42
  tol: 1.0e-8

output:
  directory: figures
  formats: [table, profiles, traces, convergence]
  trace_display:
    t_max: 15.0
    nw: 1024
