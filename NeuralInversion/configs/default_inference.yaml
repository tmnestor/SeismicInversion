data:
  n_train: 50000
  n_val: 5000
  n_test: 5000
  velocity_perturbation: 0.20
  density_perturbation: 0.15
  thickness_perturbation: 0.25
  p_values: [0.05, 0.10, 0.15, 0.20, 0.25, 0.30, 0.35, 0.40, 0.45, 0.50, 0.55, 0.60]
  nfreq: 64
  seed: 42

architecture:
  d_model: 64
  n_heads: 4
  n_layers: 3
  d_ff: 128
  dropout: 0.1

training:
  n_epochs: 200
  batch_size: 256
  learning_rate: 1.0e-03
  weight_decay: 1.0e-04
  patience: 20
  grad_clip: 1.0

hybrid:
  max_newton_iter: 10
  newton_tol: 1.0e-08
  initial_damping: null
  use_laplace: false

checkpoint_dir: checkpoints
data_dir: data
